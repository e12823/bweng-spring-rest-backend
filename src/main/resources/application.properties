# Server
server.port=8080


# Database (MariaDB)
# Can be overridden with environment variables: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:spring}
spring.datasource.username=${DB_USER:springuser}
spring.datasource.password=${DB_PASSWORD:springpw}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect


# JWT
# Can be overridden with environment variables: JWT_SECRET, JWT_EXPIRATION_MS
jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-12345}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}


# MinIO file storage
# Can be overridden with environment variables: BUCKET_HOST, BUCKET_PORT, BUCKET_ACCESS_KEY, BUCKET_ACCESS_SECRET, BUCKET_NAME
bucket.host=${BUCKET_HOST:localhost}
bucket.port=${BUCKET_PORT:9000}
bucket.access-key=${BUCKET_ACCESS_KEY:minioadmin}
bucket.access-secret=${BUCKET_ACCESS_SECRET:minioadminpw}
bucket.name=${BUCKET_NAME:blog-bucket}


# Swagger / OpenAPI
springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true


# Swagger / OpenAPI
springdoc.api-docs.path=/api
springdoc.swagger-ui.path=/swagger.html